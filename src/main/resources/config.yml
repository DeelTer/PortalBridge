# PortalBridge Configuration
# See README.md for detailed documentation

language:
  default: "en"
  auto-detect: true

hub:
  host: "cominers.net"
  port: 25565

fallback:
  enabled: true
  host: "cominers.net"
  port: 25565

# Trust lists - control which servers are accessible
trust-lists:
  whitelist:
    enabled: false                  # Only allow these servers if true
    entries: []                     # Format: ["hostname:port", "hostname"]
  blacklist:
    enabled: false                  # Block these servers if true
    entries: []

require-portalbridge-flag: true     # Target must have PortalBridge installed
require-accept-transfers: false     # Target must accept-transfers=true (disable for proxy)

portal:
  lifetime-seconds: 30              # Seconds before portal expires
  collision-radius: 5.0             # Min distance between portals
  player-proximity-block-radius: 2.0 # Min distance from other players
  max-portals-per-player: 1
  max-placement-distance: 6

  animation:
    open-ticks: 5                   # Door open animation duration
    shrink-ticks: 6                 # Portal shrink-out animation
  auto-close-ticks: 100             # Ticks before portal auto-closes after player enters
  notify-radius: 12.0               # Radius for action-bar notifications

  door:
    material: SPRUCE_DOOR
    interaction-width: 1.4
    interaction-height: 2.4

  hologram:
    height: 3.4
    see-through: true
    shadowed: true
    timer:
      green-threshold: 50           # % of lifetime where timer is green
      yellow-threshold: 25          # % below green where timer is yellow, else red

    # MiniMessage format - placeholders: <motd>, <online>, <max>, <version>, <host>, <port>, <player>, <time>, <online_icon>
    format: "<gold><bold><motd></bold>\n<green>● <online><gray>/<max>\n<gray><version> <online_icon>\n<dark_gray>↑ <player> · <time>"
    format-unreached: "<red><bold><host></bold>\n<dark_gray>↑ <player> · <time>"

  sounds:
    open:
      id: BLOCK_WOODEN_DOOR_OPEN
      volume: 1.0
      pitch: 1.0
    close:
      id: BLOCK_WOODEN_DOOR_CLOSE
      volume: 1.0
      pitch: 1.0
    place:
      id: BLOCK_WOODEN_DOOR_OPEN
      volume: 0.7
      pitch: 1.3
    unavailable:
      id: BLOCK.BAMBOO_WOOD_DOOR_CLOSE
      volume: 1.0
      pitch: 1.0

  particles:
    enabled: true
    type: PORTAL
    count: 40
    spread: 0.3

cache:
  ping-ttl-seconds: 120             # Cache duration for mcsrvstat responses
  max-size: 100

ping-timeout-millis: 5000           # Timeout for server pinging
portal-check-radius: 2.5            # Radius to check for players in portal

command-cooldown-seconds: 2         # Cooldown between /portal open commands

consent:
  ttl-seconds: 3600                 # How long to remember player consent
  cooldown-seconds: 15              # Cooldown between repeated warnings

updates:
  check-enabled: true
  repo: "DeelTer/PortalBridge"
  notify-admins: true

metrics:
  enabled: true
  plugin-id: 31401

protection:
  placement-cooldown:
    enabled: true
    seconds: 45              # Cooldown between portal placements per player
  transfer-immunity:
    enabled: true
    seconds: 10              # Immunity on join — prevents portal abuse on arrival
  spawn-protection:
    enabled: true
    radius: 16               # Block portal placement within N blocks of world spawn

debug: false
