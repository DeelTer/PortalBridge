language:
  default: "en"
  auto-detect: true

hub:
  host: "cominers.net"
  port: 25565

trust-lists:
  whitelist:
    enabled: true
    entries: []
  blacklist:
    enabled: true
    entries: []

require-portalbridge-flag: true
require-accept-transfers: false

portal:
  lifetime-seconds: 30
  collision-radius: 5.0
  player-proximity-block-radius: 2.0
  max-portals-per-player: 1
  max-placement-distance: 6

  animation:
    open-ticks: 5
    shrink-ticks: 6

  door:
    material: SPRUCE_DOOR
    interaction-width: 1.4
    interaction-height: 2.4

  hologram:
    height: 3.4
    see-through: true
    shadowed: true
    format: "<gold><bold><motd></bold>\n<green>● <online><gray>/<max>\n<gray><version>\n<dark_gray>↑ <player>"
    format-unreached: "<red><bold><host></bold>\n<dark_gray>↑ <player>"

  sounds:
    open:
      id: BLOCK_WOODEN_DOOR_OPEN
      volume: 1.0
      pitch: 1.0
    close:
      id: BLOCK_WOODEN_DOOR_CLOSE
      volume: 1.0
      pitch: 1.0
    place:
      id: BLOCK_WOODEN_DOOR_OPEN
      volume: 1.0
      pitch: 1.3

  particles:
    enabled: true
    type: PORTAL
    count: 40
    spread: 0.3

untrusted:
  action: "WARN_AND_BLOCK"
  warning-message: "<red>⚠ Target server does not have PortalBridge installed!</red>"

cache:
  # Ping cache TTL in seconds. Default = portal lifetime so info stays fresh for one portal cycle.
  ping-ttl-seconds: 30
  max-size: 100

updates:
  check-enabled: false
  repo: "yourname/PortalBridge"
  notify-admins: true

metrics:
  enabled: true
  plugin-id: 31401

debug: false
